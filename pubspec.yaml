name: focusquest
description: A gamified productivity app for university students.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  sqflite: ^2.3.3+1
  sqflite_common_ffi_web: ^0.4.5+1
  path_provider: ^2.1.4
  flutter_local_notifications: ^17.2.2
  go_router: ^14.2.7
  fl_chart: ^0.69.0
  intl: ^0.19.0
  uuid: ^4.4.2
  shared_preferences: ^2.3.2
  cupertino_icons: ^1.0.8
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
